name: 🤖 Affiliate + Auto-Blog Autopilot

on:
  schedule:
    # প্রতি 6 ঘন্টায় চলবে (UTC time)
    # 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Which pipeline to run?'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - amazon
          - twitter
      max_articles:
        description: 'Max articles to publish (overrides env)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55  # Max 55 min per cycle (within GitHub's 60min limit)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run Bot (Single Cycle)
        env:
          # ── Gemini AI (Multi-key rotation) ──────────────────────────────
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}

          # ── Amazon Scraper ───────────────────────────────────────────────
          SCRAPINGANT_API_KEYS: ${{ secrets.SCRAPINGANT_API_KEYS }}

          # ── Supabase Database ────────────────────────────────────────────
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

          # ── Next.js Publishing ───────────────────────────────────────────
          NEXT_API_URL: ${{ secrets.NEXT_API_URL }}
          BOT_API_SECRET: ${{ secrets.BOT_API_SECRET }}

          # ── Social Media Automation ──────────────────────────────────────
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}

          # ── Telegram Alerts ──────────────────────────────────────────────
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # ── Image Generation ─────────────────────────────────────────────
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}

          # ── Affiliate ────────────────────────────────────────────────────
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}

          # ── Twitter Pipeline Config ──────────────────────────────────────
          # Comma-separated handles (e.g., "sama,karpathy,AndrewYNg")
          # Leave empty to use Supabase twitter_handles table
          TWITTER_HANDLES: ${{ secrets.TWITTER_HANDLES }}

          # Site config (used when no Supabase sites are defined)
          SITE_NAME: ${{ secrets.SITE_NAME }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SITE_NICHE: ${{ secrets.SITE_NICHE }}

          # ── Runtime Settings ─────────────────────────────────────────────
          AUTO_MODE: "True"
          RUN_MODE: "single"
          # Pipeline: "all" | "amazon" | "twitter"
          RUN_PIPELINE: ${{ github.event.inputs.pipeline || 'all' }}
          AUTO_MAX_KEYWORDS: "2"
          AUTO_MAX_ARTICLES: ${{ github.event.inputs.max_articles || '4' }}
          AUTO_PRODUCTS_PER_KW: "2"

        run: python run_single_cycle.py
